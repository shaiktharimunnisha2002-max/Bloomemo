<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloomMemo Forest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#07111f;
color:white;
overflow-x:hidden;
}

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,.3);
backdrop-filter:blur(10px);
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
padding-top:100px;
padding-bottom:30px;
text-align:center;
}

#forestMap{
position:relative;
width:100%;
height:1800px;
overflow:hidden;

background:
linear-gradient(
180deg,
#07111f 0%,
#10233f 50%,
#173d2f 100%
);
}

.moon{
position:absolute;
top:80px;
right:100px;
font-size:90px;
}

.memory-tree{
position:absolute;
cursor:pointer;
transition:.3s;
user-select:none;
z-index:5;
}

.memory-tree:hover{
transform:scale(1.2);
filter:drop-shadow(0 0 20px #7dff9d);
}

.tree-icon{
font-size:70px;
display:block;
text-align:center;
}

.tree-name{
font-size:12px;
text-align:center;
margin-top:5px;
}

.firefly{
position:absolute;
font-size:14px;
animation:float 5s infinite ease-in-out;
opacity:.8;
}

@keyframes float{

0%{
transform:translateY(0);
opacity:.3;
}

50%{
transform:translateY(-20px);
opacity:1;
}

100%{
transform:translateY(0);
opacity:.3;
}

}

.ground{
position:absolute;
bottom:0;
width:100%;
height:150px;
background:#173a2d;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#10233f;
width:90%;
max-width:550px;
padding:25px;
border-radius:20px;
}

.close{
float:right;
font-size:30px;
cursor:pointer;
}

.water-btn{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#2ecc71;
color:white;
cursor:pointer;
}

.empty{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

</style>

</head>

<body>

<nav class="navbar">

<div>
🌲 BloomMemo
</div>

<div>
<a href="index.html">Home</a>
<a href="create.html">Create</a>
<a href="forest.html">Forest</a>
</div>

</nav>

<section class="hero">

<h1>🌲 Public Memory Forest</h1>

<p>
Every memory grows into a tree.
</p>

</section>

<div id="forestMap">

<div class="moon">
🌙
</div>

<div class="ground"></div>

</div>

<div id="memoryModal" class="modal">

<div class="modal-content">

<span
class="close"
onclick="closeModal()">
× </span>

<h2 id="modalRecipient"></h2>

<p id="modalSender"></p>

<p id="modalCategory"></p>

<hr style="margin:15px 0">

<p id="modalMessage"></p>

<p id="modalDate"></p>

<button
class="water-btn"
onclick="waterTree()">

💧 Water Tree

</button>

<p id="waterCount">
Waters: 0
</p>

</div>

</div>

<script>

const forest =
document.getElementById("forestMap");

const memories =
JSON.parse(
localStorage.getItem(
"bloommemo_memories"
)
) || [];

let waters = 0;

function treeEmoji(category){

switch(category){

case "Love":
return "🌸";

case "Family":
return "🌲";

case "Birthday":
return "🌻";

case "Achievement":
return "✨";

default:
return "🌳";

}

}

function renderForest(){

document
.querySelectorAll(".memory-tree")
.forEach(el=>el.remove());

if(memories.length===0){

const empty =
document.createElement("div");

empty.className="empty";

empty.innerHTML=`

<h2>
🌱 Your forest is empty
</h2>

<p>
Create your first memory.
</p>

`;

forest.appendChild(empty);

return;

}

memories.forEach(memory=>{

if(!memory.x){

memory.x =
Math.random()*85+5;

memory.y =
Math.random()*70+15;

}

const tree =
document.createElement("div");

tree.className="memory-tree";

tree.style.left=
memory.x+"%";

tree.style.top=
memory.y+"%";

tree.innerHTML=`

<div class="tree-icon">
${treeEmoji(memory.category)}
</div>

<div class="tree-name">
${memory.recipient}
</div>

`;

tree.onclick=()=>{

openModal(memory);

};

forest.appendChild(tree);

});

localStorage.setItem(
"bloommemo_memories",
JSON.stringify(memories)
);

}

function openModal(memory){

document.getElementById(
"modalRecipient"
).innerText=
"🌸 "+memory.recipient;

document.getElementById(
"modalSender"
).innerText=
"From: "+memory.sender;

document.getElementById(
"modalCategory"
).innerText=
"Category: "+memory.category;

document.getElementById(
"modalMessage"
).innerText=
memory.message;

document.getElementById(
"modalDate"
).innerText=
new Date(
memory.createdAt
).toLocaleString();

document.getElementById(
"memoryModal"
).style.display=
"flex";

}

function closeModal(){

document.getElementById(
"memoryModal"
).style.display=
"none";

}

function waterTree(){

waters++;

document.getElementById(
"waterCount"
).innerText=
"Waters: "+waters;

}

for(let i=0;i<40;i++){

const fly =
document.createElement("div");

fly.className="firefly";

fly.innerHTML="✨";

fly.style.left=
Math.random()*100+"%";

fly.style.top=
Math.random()*100+"%";

fly.style.animationDelay=
Math.random()*5+"s";

forest.appendChild(fly);

}

renderForest();

</script>

</body>
</html>
