<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloomMemo Forest</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#07111f;
color:white;
overflow-x:hidden;
}

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,.3);
backdrop-filter:blur(10px);
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

#forestMap{
position:relative;
width:100%;
height:1800px;
background:
linear-gradient(
180deg,
#07111f 0%,
#10233f 50%,
#1a4733 100%
);
overflow:hidden;
}

.moon{
position:absolute;
top:80px;
right:100px;
font-size:90px;
}

.memory-tree{
position:absolute;
cursor:pointer;
transition:.3s;
user-select:none;
}

.memory-tree:hover{
transform:scale(1.2);
filter:drop-shadow(0 0 15px #7dff9d);
}

.tree-icon{
font-size:70px;
display:block;
text-align:center;
}

.tree-name{
font-size:12px;
text-align:center;
margin-top:5px;
}

.firefly{
position:absolute;
font-size:16px;
animation:float 5s infinite ease-in-out;
}

@keyframes float{

0%{
transform:translateY(0px);
opacity:.3;
}

50%{
transform:translateY(-20px);
opacity:1;
}

100%{
transform:translateY(0px);
opacity:.3;
}

}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
z-index:2000;
}

.modal-content{
background:#10233f;
width:90%;
max-width:500px;
padding:25px;
border-radius:20px;
}

.close{
float:right;
font-size:28px;
cursor:pointer;
}

.water-btn{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#2ecc71;
color:white;
cursor:pointer;
}

.hero{
padding-top:100px;
text-align:center;
padding-bottom:40px;
}

.hero h1{
font-size:3rem;
}

.hero p{
opacity:.8;
margin-top:10px;
}

.ground{
position:absolute;
bottom:0;
width:100%;
height:150px;
background:#173a2d;
}

</style>

</head>

<body>

<nav class="navbar">
<div>🌲 BloomMemo</div>

<div>
<a href="#">Home</a>
<a href="#">Create</a>
<a href="#">Forest</a>
<a href="#">Profile</a>
</div>
</nav>

<section class="hero">
<h1>🌲 Public Memory Forest</h1>
<p>Explore memories planted by people around the world.</p>
</section>

<div id="forestMap">

<div class="moon">🌙</div>

<div class="ground"></div>

</div>

<div id="memoryModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">
×
</span>

<h2 id="modalRecipient"></h2>

<p id="modalSender"></p>

<p id="modalCategory"></p>

<hr style="margin:15px 0">

<p id="modalMessage"></p>

<p id="modalDate"></p>

<button
class="water-btn"
onclick="waterTree()">

💧 Water Tree

</button>

<p id="waterCount">
Waters: 0
</p>

</div>

</div>

<script>

const memories = [

{
recipient:"Sarah",
sender:"John",
category:"Friendship",
message:"Thank you for always being there.",
createdAt:"2026-06-04"
},

{
recipient:"Emma",
sender:"David",
category:"Love",
message:"You changed my life forever.",
createdAt:"2026-06-01"
},

{
recipient:"Mom",
sender:"Arjun",
category:"Family",
message:"Thank you for everything.",
createdAt:"2026-05-28"
},

{
recipient:"Ravi",
sender:"Anil",
category:"Achievement",
message:"Congratulations on your success!",
createdAt:"2026-05-20"
}

];

let waters = 0;

const forest =
document.getElementById("forestMap");

function treeEmoji(category){

switch(category){

case "Love":
return "🌸";

case "Family":
return "🌲";

case "Achievement":
return "✨";

default:
return "🌳";

}

}

function renderForest(){

memories.forEach(memory=>{

const tree =
document.createElement("div");

tree.className="memory-tree";

tree.style.left=
(Math.random()*85+5)+"%";

tree.style.top=
(Math.random()*70+15)+"%";

tree.innerHTML=`

<div class="tree-icon">
${treeEmoji(memory.category)}
</div>

<div class="tree-name">
${memory.recipient}
</div>

`;

tree.onclick=()=>{

openModal(memory);

};

forest.appendChild(tree);

});

}

function openModal(memory){

document.getElementById(
"modalRecipient"
).innerText =
memory.recipient;

document.getElementById(
"modalSender"
).innerText =
"From: " + memory.sender;

document.getElementById(
"modalCategory"
).innerText =
memory.category;

document.getElementById(
"modalMessage"
).innerText =
memory.message;

document.getElementById(
"modalDate"
).innerText =
memory.createdAt;

document.getElementById(
"memoryModal"
).style.display =
"flex";

}

function closeModal(){

document.getElementById(
"memoryModal"
).style.display =
"none";

}

function waterTree(){

waters++;

document.getElementById(
"waterCount"
).innerText =
"Waters: " + waters;

}

for(let i=0;i<40;i++){

const fly =
document.createElement("div");

fly.className="firefly";

fly.innerHTML="✨";

fly.style.left=
Math.random()*100+"%";

fly.style.top=
Math.random()*100+"%";

fly.style.animationDelay=
Math.random()*5+"s";

forest.appendChild(fly);

}

renderForest();

</script>

</body>
</html>
