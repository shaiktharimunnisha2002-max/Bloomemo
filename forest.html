<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Forest | BloomMemo</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#07111f,#10233f);
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
}

.logo{
font-size:1.4rem;
font-weight:700;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
}

.hero{
text-align:center;
padding:40px 20px;
}

.search-bar{
max-width:500px;
margin:auto;
}

.search-bar input{
width:100%;
padding:14px;
border:none;
border-radius:15px;
}

.filters{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:20px;
}

.filter-btn{
padding:10px 18px;
border:none;
border-radius:50px;
cursor:pointer;
background:rgba(255,255,255,.1);
color:white;
}

.filter-btn.active{
background:#2ecc71;
}

.forest-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.tree-card{
background:rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.tree-card:hover{
transform:translateY(-5px);
}

.tree-icon{
font-size:70px;
margin-bottom:10px;
}

.meta{
font-size:.9rem;
opacity:.8;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:#10233f;
width:90%;
max-width:600px;
padding:30px;
border-radius:20px;
}

.close{
float:right;
font-size:24px;
cursor:pointer;
}

.water-btn{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#2ecc71;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
🌲 BloomMemo
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="create.html">Create</a>
<a href="profile.html">Profile</a>
</div>

</nav>

<section class="hero">

<h1>🌲 Public Memory Forest</h1>

<p>
Explore memories planted by people around the world.
</p>

<div class="search-bar">
<input
type="text"
id="searchInput"
placeholder="Search memories...">
</div>

</section>

<div class="filters">

<button class="filter-btn active"
onclick="filterCategory('all')">
All </button>

<button class="filter-btn"
onclick="filterCategory('Friendship')">
Friendship </button>

<button class="filter-btn"
onclick="filterCategory('Love')">
Love </button>

<button class="filter-btn"
onclick="filterCategory('Family')">
Family </button>

<button class="filter-btn"
onclick="filterCategory('Achievement')">
Achievement </button>

<button class="filter-btn"
onclick="filterCategory('Birthday')">
Birthday </button>

</div>

<div
id="forest"
class="forest-grid">

</div>

<div
id="memoryModal"
class="modal">

<div class="modal-content">

<span
class="close"
onclick="closeModal()">
× </span>

<h2 id="modalRecipient"></h2>

<p id="modalSender"></p>

<p id="modalCategory"></p>

<hr>

<p id="modalMessage"></p>

<p id="modalDate"></p>

<button
class="water-btn"
onclick="waterTree()">

💧 Water Tree

</button>

<p id="waterCount">
Waters: 0
</p>

</div>

</div>

<script>

let memories=[];
let currentWaters=0;

Object.keys(localStorage)
.forEach(key=>{

if(key.startsWith("memory_")){

memories.push(
JSON.parse(
localStorage.getItem(key)
)
);

}

});

renderForest(memories);

function renderForest(data){

const forest=
document.getElementById("forest");

forest.innerHTML="";

data.forEach(memory=>{

const tree=
document.createElement("div");

tree.className="tree-card";

tree.innerHTML=`

<div class="tree-icon">
🌳
</div>

<h3>
${memory.recipient}
</h3>

<div class="meta">
${memory.category}
</div>

`;

tree.onclick=()=>{

openModal(memory);

};

forest.appendChild(tree);

});

}

function openModal(memory){

document.getElementById(
"modalRecipient"
).textContent=
"🌸 "+memory.recipient;

document.getElementById(
"modalSender"
).textContent=
"From: "+memory.sender;

document.getElementById(
"modalCategory"
).textContent=
"Category: "+memory.category;

document.getElementById(
"modalMessage"
).textContent=
memory.message;

document.getElementById(
"modalDate"
).textContent=
"Created: "+
new Date(
memory.createdAt
).toLocaleDateString();

document.getElementById(
"memoryModal"
).style.display="flex";

}

function closeModal(){

document.getElementById(
"memoryModal"
).style.display="none";

}

function filterCategory(category){

if(category==="all"){

renderForest(memories);

return;

}

renderForest(

memories.filter(
m=>m.category===category
)

);

}

document
.getElementById(
"searchInput"
)
.addEventListener(
"input",
function(){

const value=
this.value.toLowerCase();

renderForest(

memories.filter(m=>

m.recipient
.toLowerCase()
.includes(value)

)

);

}
);

function waterTree(){

currentWaters++;

document.getElementById(
"waterCount"
).textContent=
"Waters: "+
currentWaters;

}

</script>

</body>

</html>
