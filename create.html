<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Memory | BloomMemo</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
background:linear-gradient(180deg,#07111f,#10233f);
font-family:'Poppins',sans-serif;
margin:0;
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(255,255,255,.05);
backdrop-filter:blur(10px);
}

.logo{
font-size:1.5rem;
font-weight:700;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
color:white;
text-decoration:none;
}

.container{
max-width:800px;
margin:40px auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.08);
padding:30px;
border-radius:24px;
backdrop-filter:blur(10px);
}

h1{
text-align:center;
margin-bottom:30px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:500;
}

input,
select,
textarea{

width:100%;
padding:15px;

border:none;
border-radius:15px;

background:rgba(255,255,255,.1);
color:white;
}

textarea{
height:140px;
resize:none;
}

textarea::placeholder,
input::placeholder{
color:#d6d6d6;
}

.counter{
text-align:right;
font-size:.85rem;
opacity:.7;
margin-top:5px;
}

.toggle{
display:flex;
gap:10px;
align-items:center;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#2ecc71;
color:white;
font-size:1rem;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

.success{
display:none;
margin-top:20px;
padding:15px;
background:#1f7a45;
border-radius:12px;
}

@media(max-width:768px){

.navbar{
flex-direction:column;
gap:15px;
}

.nav-links{
flex-wrap:wrap;
justify-content:center;
}

}

</style>

</head>

<body>

<nav class="navbar">

<div class="logo">
🌲 BloomMemo
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="forest.html">Forest</a>
<a href="profile.html">Profile</a>
</div>

</nav>

<div class="container">

<div class="card">

<h1>🌱 Create a Memory</h1>

<form id="memoryForm">

<div class="form-group">

<label>Your Name</label>

<input
type="text"
id="sender"
placeholder="Enter your name"
required>

</div>

<div class="form-group">

<label>Recipient Name</label>

<input
type="text"
id="recipient"
placeholder="Who is this memory for?"
required>

</div>

<div class="form-group">

<label>Category</label>

<select id="category">

<option>Friendship</option>
<option>Love</option>
<option>Family</option>
<option>Achievement</option>
<option>Birthday</option>
<option>Memorial</option>

</select>

</div>

<div class="form-group">

<label>Memory Message</label>

<textarea
id="message"
maxlength="500"
placeholder="Write something meaningful..."></textarea>

<div class="counter">
<span id="charCount">0</span>/500
</div>

</div>

<div class="form-group">

<label>Reveal Date</label>

<input
type="date"
id="revealDate">

</div>

<div class="form-group">

<label>Visibility</label>

<div class="toggle">

<input
type="checkbox"
id="publicMemory">

<label for="publicMemory">
Make Public
</label>

</div>

</div>

<button
type="submit"
class="btn">

🌱 Plant Memory

</button>

</form>

<div
id="success"
class="success">

Memory created successfully.

</div>

</div>

</div>

<script>

const message =
document.getElementById("message");

const charCount =
document.getElementById("charCount");

message.addEventListener(
"input",
()=>{
charCount.textContent =
message.value.length;
}
);

document
.getElementById("memoryForm")
.addEventListener(
"submit",
function(e){

e.preventDefault();

const memory={

sender:
document.getElementById("sender").value,

recipient:
document.getElementById("recipient").value,

category:
document.getElementById("category").value,

message:
document.getElementById("message").value,

revealDate:
document.getElementById("revealDate").value,

public:
document.getElementById("publicMemory").checked,

createdAt:
new Date().toISOString()

};

localStorage.setItem(
"memory_"+Date.now(),
JSON.stringify(memory)
);

document.getElementById(
"success"
).style.display="block";

this.reset();

charCount.textContent="0";

});

</script>

</body>

</html>
