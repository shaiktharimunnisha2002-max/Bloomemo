<!DOCTYPE html>
<html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>BloomMemo Forest Pro</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(#06111d,#10273f);color:white}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:rgba(255,255,255,.08);padding:20px;border-radius:20px;margin-top:15px}
input,textarea,select{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none}
button{padding:12px;border:none;border-radius:10px;background:#2ecc71;color:white}
.hero{text-align:center;padding:30px}
.grow{font-size:90px;text-align:center}
.link{background:#111;padding:10px;border-radius:10px;word-break:break-all}
</style></head>
<body><div class='container' id='app'></div>
<script>
const app=document.getElementById('app');
function home(){
app.innerHTML=`<div class='hero'><h1>🌲 BloomMemo Forest Pro</h1></div>
<div class='card'>
<input id='to' placeholder='Recipient'>
<input id='from' placeholder='Your Name'>
<select id='cat'><option>Friendship</option><option>Love</option><option>Family</option></select>
<textarea id='msg' placeholder='Memory'></textarea>
<button onclick='createMemory()'>Plant Memory</button></div>`;
}
function createMemory(){
const d={to:to.value,from:from.value,cat:cat.value,msg:msg.value};
const e=btoa(JSON.stringify(d));
const url=location.origin+location.pathname+'?m='+e;
app.innerHTML=`<div class='card'><h2>Share Link</h2><div class='link'>${url}</div></div>`;
}
function memoryPage(d){
app.innerHTML=`<div class='hero'><h1>Memory for ${d.to}</h1><p>${d.from}</p></div>
<div class='card'><div id='plant' class='grow'>🌰</div><button id='r' style='display:none'>Reveal</button><div id='c'></div></div>`;
const stages=['🌰','🌱','🌿','🌷','🌸','🌳']; let i=0;
let t=setInterval(()=>{i++; if(i<stages.length){plant.innerHTML=stages[i]} else {clearInterval(t); r.style.display='inline-block';}},800);
r.onclick=()=>{c.innerHTML='<div class="card"><h3>'+d.cat+'</h3><p>'+d.msg+'</p></div>';}
}
const p=new URLSearchParams(location.search);
if(p.get('m')) memoryPage(JSON.parse(atob(p.get('m')))); else home();
</script></body></html>
